program:run_sweep.py
command:
  - ${env:PYTHONNOUSERSITE=1}
  - pixi
  - run
  - python
  - ${program}
  - ${args}
method: bayes
metric:
  name: metrics/mAP50(B)
  goal: maximize
early_terminate:
  type: hyperband
  min_iter: 10
parameters:
  phase:
    value: "augmentation"
  # Albumentations only (since RT-DETR does not use YOLO native mosaic/mixup)
  albu_rotate90_p: {distribution: uniform, min: 0.5, max: 1.0}
  albu_spatial_p: {distribution: uniform, min: 0.4, max: 0.8}
  albu_warp_p: {distribution: uniform, min: 0.0, max: 0.1}
  albu_crop_p: {distribution: uniform, min: 0.3, max: 0.6}
  albu_texture_p: {distribution: uniform, min: 0.2, max: 0.5}
  albu_color_p: {distribution: uniform, min: 0.3, max: 0.7}
  albu_dropout_p: {distribution: uniform, min: 0.1, max: 0.4}
  albu_noise_p: {distribution: uniform, min: 0.1, max: 0.4}
